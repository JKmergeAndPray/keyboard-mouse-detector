<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Computer & Keyboard Detector</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

    <div class="container">

        <h1>Computer & Keyboard Detector</h1>

        <p>Upload an image to detect keyboards and computer mice.</p>

        <form action="/predict"
              method="POST"
              enctype="multipart/form-data">

            <input
                type="file"
                name="image"
                accept="image/*"
                required>

            <br><br>

            <button type="submit">
                Detect Objects
            </button>

        </form>

        {% if result_image %}

            <h2>Detection Result</h2>

            <img
                src="{{ url_for('static', filename='results/' + result_image) }}"
                width="700">

        {% endif %}

    </div>

</body>

</html>
